<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Customer Segmentation Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;

    --seg0: #f78166;  /* Champions - coral */
    --seg1: #3fb950;  /* Loyalists - green */
    --seg2: #d2a8ff;  /* At Risk - purple */
    --seg3: #ffa657;  /* New - amber */
    --seg4: #79c0ff;  /* Dormant - sky */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.3px; }
  header h1 span { color: var(--accent); }
  .header-meta { font-size: 0.75rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  /* ── LAYOUT ── */
  .main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }
  .controls-bar {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 20px; margin-bottom: 24px;
  }
  .controls-bar label { font-size: 0.8rem; color: var(--muted); }
  select, input[type=range], input[type=file] {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 6px 10px; font-size: 0.82rem;
    font-family: 'Inter', sans-serif; cursor: pointer;
  }
  input[type=range] { padding: 2px; width: 130px; accent-color: var(--accent); }
  .k-val { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--accent); min-width: 18px; }
  .btn {
    background: var(--accent); color: #0d1117; border: none; border-radius: 6px;
    padding: 7px 18px; font-size: 0.82rem; font-weight: 600; cursor: pointer;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn.secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
  .file-label {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); border-radius: 6px; padding: 6px 12px;
    font-size: 0.8rem; cursor: pointer; white-space: nowrap;
  }
  .file-label:hover { color: var(--text); border-color: var(--accent); }

  /* ── KPI STRIP ── */
  .kpi-strip { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 24px; }
  .kpi {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px 20px; position: relative; overflow: hidden;
  }
  .kpi::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--seg-color, var(--accent));
  }
  .kpi-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
  .kpi-value { font-size: 1.6rem; font-weight: 700; line-height: 1; }
  .kpi-sub { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  .kpi-badge {
    display: inline-block; font-size: 0.68rem; font-weight: 600;
    padding: 2px 7px; border-radius: 20px; margin-top: 6px;
    background: color-mix(in srgb, var(--seg-color) 18%, transparent);
    color: var(--seg-color);
  }

  /* ── GRID ── */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 22px;
  }
  .card-title {
    font-size: 0.82rem; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: .5px; margin-bottom: 18px;
  }
  canvas { max-height: 280px; }

  /* ── SEGMENT LEGEND ── */
  .seg-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
  .seg-pill {
    display: flex; align-items: center; gap: 7px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 13px; font-size: 0.78rem; cursor: pointer;
    transition: border-color .15s;
  }
  .seg-pill:hover, .seg-pill.active { border-color: var(--pill-color); }
  .seg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .seg-pill span { color: var(--muted); font-size: 0.72rem; font-family: 'JetBrains Mono', monospace; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  thead th {
    text-align: left; padding: 9px 14px; color: var(--muted);
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: .5px;
    border-bottom: 1px solid var(--border); font-weight: 500;
  }
  tbody tr { border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent); }
  tbody tr:hover { background: color-mix(in srgb, var(--accent) 5%, transparent); }
  tbody td { padding: 9px 14px; }
  .seg-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.73rem; font-weight: 500;
    padding: 2px 9px; border-radius: 12px;
    background: color-mix(in srgb, var(--tag-color) 15%, transparent);
    color: var(--tag-color);
  }
  .seg-tag::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* ── INSIGHT BOX ── */
  .insights { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 14px; margin-bottom: 20px; }
  .insight {
    background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--i-color);
    border-radius: 8px; padding: 14px 16px;
  }
  .insight-head { font-size: 0.78rem; font-weight: 600; margin-bottom: 4px; color: var(--i-color); }
  .insight-body { font-size: 0.78rem; color: var(--muted); line-height: 1.55; }

  /* ── STATUS ── */
  .status-bar {
    background: color-mix(in srgb, var(--accent) 10%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    border-radius: 8px; padding: 10px 16px; margin-bottom: 24px;
    font-size: 0.8rem; color: var(--accent); display: none;
  }

  @media (max-width: 900px) {
    .kpi-strip { grid-template-columns: repeat(2, 1fr); }
    .grid2, .grid3 { grid-template-columns: 1fr; }
    .main { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>Customer <span>Segmentation</span> Dashboard</h1>
  <div class="header-meta" id="dataInfo">Sample data · 500 customers · K=5</div>
</header>

<div class="main">

  <!-- Controls -->
  <div class="controls-bar">
    <div>
      <label>Clusters (K)</label><br>
      <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
        <input type="range" id="kSlider" min="2" max="7" value="5" oninput="updateK(this.value)">
        <span class="k-val" id="kVal">5</span>
      </div>
    </div>
    <div>
      <label>Feature X</label><br>
      <select id="featX" onchange="rerenderScatter()" style="margin-top:4px">
        <option value="spend">Avg. Spend (₹)</option>
        <option value="frequency">Purchase Freq.</option>
        <option value="recency">Recency (days)</option>
        <option value="age">Age</option>
      </select>
    </div>
    <div>
      <label>Feature Y</label><br>
      <select id="featY" onchange="rerenderScatter()" style="margin-top:4px">
        <option value="frequency">Purchase Freq.</option>
        <option value="spend">Avg. Spend (₹)</option>
        <option value="recency">Recency (days)</option>
        <option value="clv">CLV Score</option>
      </select>
    </div>
    <button class="btn" onclick="runClustering()">▶ Run Clustering</button>
    <label class="file-label">
      📂 Upload CSV
      <input type="file" id="csvUpload" accept=".csv" style="display:none" onchange="loadCSV(event)">
    </label>
    <button class="btn secondary" onclick="downloadReport()">⬇ Export Report</button>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <!-- KPI Strip -->
  <div class="kpi-strip" id="kpiStrip"></div>

  <!-- Segment Legend -->
  <div class="seg-legend" id="segLegend"></div>

  <!-- Charts Row 1 -->
  <div class="grid2">
    <div class="card">
      <div class="card-title">Cluster Scatter Plot</div>
      <canvas id="scatterChart"></canvas>
    </div>
    <div class="card">
      <div class="card-title">Segment Size Distribution</div>
      <canvas id="donutChart"></canvas>
    </div>
  </div>

  <!-- Charts Row 2 -->
  <div class="grid3">
    <div class="card">
      <div class="card-title">Avg. Spend by Segment</div>
      <canvas id="spendChart"></canvas>
    </div>
    <div class="card">
      <div class="card-title">Purchase Frequency Heatmap</div>
      <canvas id="freqChart"></canvas>
    </div>
    <div class="card">
      <div class="card-title">RFM Radar — Segment Profiles</div>
      <canvas id="radarChart"></canvas>
    </div>
  </div>

  <!-- Insights -->
  <div class="insights" id="insightsBox"></div>

  <!-- Customer Table -->
  <div class="card">
    <div class="card-title">Customer Sample · <span id="tableCount">—</span></div>
    <div class="table-wrap">
      <table id="customerTable">
        <thead>
          <tr>
            <th>ID</th><th>Name</th><th>Age</th><th>Gender</th>
            <th>Segment</th><th>Spend (₹)</th><th>Freq.</th><th>Recency</th><th>CLV</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
// ── DATA GENERATION ──────────────────────────────────────────────
const NAMES = ['Aarav','Priya','Rohit','Sneha','Amit','Kavya','Raj','Ananya','Vijay','Meera',
  'Arjun','Divya','Karan','Nisha','Suresh','Pooja','Dev','Riya','Sanjay','Lakshmi',
  'Akash','Shreya','Nikhil','Tanvi','Varun','Isha','Rahul','Anjali','Aditya','Simran',
  'Mohammed','Fatima','Aryan','Zara','Harsh','Neha','Vivek','Swati','Kunal','Deepa'];
const GENDERS = ['M','F','F','M','M','F','M','F','M','F'];
const CATEGORIES = ['Electronics','Fashion','Grocery','Home & Kitchen','Beauty','Sports','Books'];

function rand(a,b){ return a + Math.random()*(b-a); }
function randInt(a,b){ return Math.floor(rand(a,b+1)); }
function pick(arr){ return arr[randInt(0, arr.length-1)]; }

function generateCustomers(n=500){
  const customers = [];
  for(let i=0;i<n;i++){
    const tier = Math.random(); // controls which cluster this customer "naturally" belongs to
    let spend, freq, recency, age;
    if(tier < 0.12){        // Champions
      spend=rand(8000,20000); freq=rand(12,25); recency=randInt(1,20); age=randInt(28,45);
    } else if(tier < 0.30){ // Loyal
      spend=rand(3000,8000); freq=rand(6,14); recency=randInt(15,50); age=randInt(30,55);
    } else if(tier < 0.55){ // At Risk
      spend=rand(1000,4000); freq=rand(2,7); recency=randInt(60,130); age=randInt(22,60);
    } else if(tier < 0.75){ // New
      spend=rand(500,2500); freq=rand(1,3); recency=randInt(1,30); age=randInt(18,35);
    } else {                 // Dormant
      spend=rand(200,1500); freq=rand(1,3); recency=randInt(120,365); age=randInt(25,70);
    }
    const clv = Math.round((spend * freq * (1/(recency+1)) * 100));
    customers.push({
      id: `CUS${String(i+1).padStart(4,'0')}`,
      name: NAMES[i % NAMES.length] + ' ' + String.fromCharCode(65 + randInt(0,9)) + '.',
      age: Math.round(age), gender: GENDERS[i%10],
      spend: Math.round(spend), freq: Math.round(freq),
      recency: Math.round(recency), clv,
      category: pick(CATEGORIES),
      cluster: -1
    });
  }
  return customers;
}

// ── K-MEANS (Simple JS impl) ──────────────────────────────────────
function normalize(customers, keys){
  const stats = {};
  keys.forEach(k => {
    const vals = customers.map(c=>c[k]);
    stats[k] = { min: Math.min(...vals), max: Math.max(...vals) };
  });
  return customers.map(c => {
    const norm = {};
    keys.forEach(k => {
      norm[k] = (c[k] - stats[k].min) / (stats[k].max - stats[k].min + 1e-9);
    });
    return norm;
  });
}

function kmeans(customers, k=5, iters=30){
  const keys = ['spend','freq','recency','clv'];
  const norms = normalize(customers, keys);
  // Init centroids from data
  let centroids = [];
  const used = new Set();
  while(centroids.length < k){
    const idx = randInt(0, customers.length-1);
    if(!used.has(idx)){ used.add(idx); centroids.push({...norms[idx]}); }
  }
  let assignments = new Array(customers.length).fill(0);
  for(let iter=0; iter<iters; iter++){
    // Assign
    for(let i=0;i<norms.length;i++){
      let best=0, bestD=Infinity;
      centroids.forEach((c,ci)=>{
        const d = keys.reduce((s,k)=>s+(norms[i][k]-c[k])**2, 0);
        if(d<bestD){ bestD=d; best=ci; }
      });
      assignments[i]=best;
    }
    // Recompute centroids
    centroids = centroids.map((_,ci)=>{
      const members = norms.filter((_,i)=>assignments[i]===ci);
      if(!members.length) return centroids[ci];
      return Object.fromEntries(keys.map(k=>[k, members.reduce((s,m)=>s+m[k],0)/members.length]));
    });
  }
  // Assign clusters to actual customers
  customers.forEach((c,i) => c.cluster = assignments[i]);
  // Sort clusters by avg spend desc → meaningful labels
  const avgSpend = centroids.map((_,ci)=>{
    const members = customers.filter(c=>c.cluster===ci);
    return members.reduce((s,c)=>s+c.spend,0)/(members.length||1);
  });
  const order = avgSpend.map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v).map(x=>x.i);
  const remap = {};
  order.forEach((orig,newIdx)=>{ remap[orig]=newIdx; });
  customers.forEach(c=>{ c.cluster=remap[c.cluster]; });
  return customers;
}

// ── SEGMENT META ─────────────────────────────────────────────────
const SEG_COLORS = ['#f78166','#3fb950','#d2a8ff','#ffa657','#79c0ff','#56d364','#ff9f68'];
const SEG_NAMES_5 = ['Champions','Loyalists','At Risk','New Customers','Dormant'];
const SEG_NAMES_ALL = {
  2: ['High Value','Low Engagement'],
  3: ['Champions','Mid Tier','Dormant'],
  4: ['Champions','Loyalists','At Risk','Dormant'],
  5: ['Champions','Loyalists','At Risk','New Customers','Dormant'],
  6: ['Champions','Loyalists','At Risk','Casual','New Customers','Dormant'],
  7: ['Champions','Loyalists','High Potential','At Risk','Casual','New Customers','Dormant']
};
function segName(k, cluster){ return (SEG_NAMES_ALL[k]||SEG_NAMES_5)[cluster] || `Segment ${cluster+1}`; }

// ── STATE ─────────────────────────────────────────────────────────
let customers = [];
let K = 5;
let charts = {};

function getK(){ return parseInt(document.getElementById('kSlider').value); }

function showStatus(msg, autohide=true){
  const el = document.getElementById('statusBar');
  el.textContent = msg; el.style.display='block';
  if(autohide) setTimeout(()=>{ el.style.display='none'; }, 3000);
}

// ── INIT ─────────────────────────────────────────────────────────
window.onload = () => {
  customers = generateCustomers(500);
  runClustering();
};

function updateK(v){
  document.getElementById('kVal').textContent = v;
}

function runClustering(){
  K = getK();
  showStatus(`Running K-Means with K=${K}…`, false);
  setTimeout(()=>{
    kmeans(customers, K);
    document.getElementById('dataInfo').textContent = `Sample data · ${customers.length} customers · K=${K}`;
    renderAll();
    showStatus(`✓ Clustered ${customers.length} customers into ${K} segments`);
  }, 50);
}

// ── RENDER ALL ───────────────────────────────────────────────────
function renderAll(){
  renderKPIs();
  renderLegend();
  renderScatter();
  renderDonut();
  renderSpend();
  renderFreq();
  renderRadar();
  renderInsights();
  renderTable();
}

function getSegGroups(){
  const groups = {};
  for(let k=0;k<K;k++) groups[k]=[];
  customers.forEach(c => groups[c.cluster].push(c));
  return groups;
}

// ── KPIs ─────────────────────────────────────────────────────────
function renderKPIs(){
  const groups = getSegGroups();
  const strip = document.getElementById('kpiStrip');
  strip.innerHTML = '';
  strip.style.gridTemplateColumns = `repeat(${Math.min(K,5)}, 1fr)`;
  for(let k=0;k<Math.min(K,5);k++){
    const members = groups[k]||[];
    const avgSpend = members.length ? Math.round(members.reduce((s,c)=>s+c.spend,0)/members.length) : 0;
    const div = document.createElement('div');
    div.className='kpi';
    div.style.setProperty('--seg-color', SEG_COLORS[k]);
    div.innerHTML=`
      <div class="kpi-label">${segName(K,k)}</div>
      <div class="kpi-value">${members.length}</div>
      <div class="kpi-sub">customers</div>
      <div class="kpi-badge" style="--seg-color:${SEG_COLORS[k]}">₹${avgSpend.toLocaleString('en-IN')} avg</div>`;
    strip.appendChild(div);
  }
}

// ── LEGEND ───────────────────────────────────────────────────────
function renderLegend(){
  const groups = getSegGroups();
  const legend = document.getElementById('segLegend');
  legend.innerHTML='';
  for(let k=0;k<K;k++){
    const pill = document.createElement('div');
    pill.className='seg-pill active';
    pill.style.setProperty('--pill-color', SEG_COLORS[k]);
    pill.innerHTML=`<div class="seg-dot" style="background:${SEG_COLORS[k]}"></div>
      ${segName(K,k)} <span>${groups[k].length}</span>`;
    legend.appendChild(pill);
  }
}

// ── SCATTER ──────────────────────────────────────────────────────
function getFeature(c, feat){
  if(feat==='clv') return c.clv/100;
  return c[feat];
}
function featLabel(feat){
  return {spend:'Avg. Spend (₹)',frequency:'Freq.',recency:'Recency (days)',age:'Age',clv:'CLV Score'}[feat]||feat;
}

function renderScatter(){
  const fx = document.getElementById('featX').value;
  const fy = document.getElementById('featY').value;
  const groups = getSegGroups();
  const datasets = [];
  for(let k=0;k<K;k++){
    datasets.push({
      label: segName(K,k),
      data: groups[k].map(c=>({x: getFeature(c,fx), y: getFeature(c,fy)})),
      backgroundColor: SEG_COLORS[k]+'aa',
      pointRadius: 4, pointHoverRadius: 6
    });
  }
  destroyChart('scatterChart');
  charts.scatter = new Chart(document.getElementById('scatterChart'),{
    type:'scatter', data:{datasets},
    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{legend:{labels:{color:'#8b949e',font:{size:11}}}},
      scales:{
        x:{title:{display:true,text:featLabel(fx),color:'#8b949e'},ticks:{color:'#8b949e'},grid:{color:'#30363d'}},
        y:{title:{display:true,text:featLabel(fy),color:'#8b949e'},ticks:{color:'#8b949e'},grid:{color:'#30363d'}}
      }
    }
  });
}
function rerenderScatter(){ if(customers.length) renderScatter(); }

// ── DONUT ────────────────────────────────────────────────────────
function renderDonut(){
  const groups = getSegGroups();
  destroyChart('donutChart');
  charts.donut = new Chart(document.getElementById('donutChart'),{
    type:'doughnut',
    data:{
      labels: Array.from({length:K},(_,k)=>segName(K,k)),
      datasets:[{
        data: Array.from({length:K},(_,k)=>(groups[k]||[]).length),
        backgroundColor: SEG_COLORS.slice(0,K),
        borderColor: '#1c2128', borderWidth: 3
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{legend:{labels:{color:'#8b949e',font:{size:11}}}}
    }
  });
}

// ── SPEND BAR ────────────────────────────────────────────────────
function renderSpend(){
  const groups = getSegGroups();
  const avgSpends = Array.from({length:K},(_,k)=>{
    const m=groups[k]||[]; return m.length ? Math.round(m.reduce((s,c)=>s+c.spend,0)/m.length) : 0;
  });
  destroyChart('spendChart');
  charts.spend = new Chart(document.getElementById('spendChart'),{
    type:'bar',
    data:{
      labels: Array.from({length:K},(_,k)=>segName(K,k)),
      datasets:[{
        label:'Avg Spend (₹)',
        data: avgSpends,
        backgroundColor: SEG_COLORS.slice(0,K),
        borderRadius: 5
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:true, indexAxis:'y',
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#8b949e'},grid:{color:'#30363d'}},
        y:{ticks:{color:'#8b949e'},grid:{display:false}}
      }
    }
  });
}

// ── FREQ HEATMAP (bar as proxy) ───────────────────────────────────
function renderFreq(){
  const groups = getSegGroups();
  const avgFreqs = Array.from({length:K},(_,k)=>{
    const m=groups[k]||[]; return m.length ? +(m.reduce((s,c)=>s+c.freq,0)/m.length).toFixed(1) : 0;
  });
  const avgRec = Array.from({length:K},(_,k)=>{
    const m=groups[k]||[]; return m.length ? Math.round(m.reduce((s,c)=>s+c.recency,0)/m.length) : 0;
  });
  destroyChart('freqChart');
  charts.freq = new Chart(document.getElementById('freqChart'),{
    type:'bar',
    data:{
      labels: Array.from({length:K},(_,k)=>segName(K,k)),
      datasets:[
        {label:'Avg Frequency', data:avgFreqs, backgroundColor:'#58a6ff99', borderRadius:4},
        {label:'Avg Recency (÷10)', data:avgRec.map(v=>+(v/10).toFixed(1)), backgroundColor:'#d2a8ff66', borderRadius:4}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{legend:{labels:{color:'#8b949e',font:{size:10}}}},
      scales:{
        x:{ticks:{color:'#8b949e'},grid:{display:false}},
        y:{ticks:{color:'#8b949e'},grid:{color:'#30363d'}}
      }
    }
  });
}

// ── RADAR ─────────────────────────────────────────────────────────
function renderRadar(){
  const groups = getSegGroups();
  function norm(arr){ const mx=Math.max(...arr,1); return arr.map(v=>+(v/mx*100).toFixed(1)); }
  const spends = Array.from({length:K},(_,k)=>{ const m=groups[k]||[]; return m.length?m.reduce((s,c)=>s+c.spend,0)/m.length:0; });
  const freqs  = Array.from({length:K},(_,k)=>{ const m=groups[k]||[]; return m.length?m.reduce((s,c)=>s+c.freq,0)/m.length:0; });
  const recs   = Array.from({length:K},(_,k)=>{ const m=groups[k]||[]; return m.length?100-m.reduce((s,c)=>s+Math.min(c.recency,365),0)/m.length/365*100:0; });
  const clvs   = Array.from({length:K},(_,k)=>{ const m=groups[k]||[]; return m.length?m.reduce((s,c)=>s+c.clv,0)/m.length:0; });
  const sizes  = Array.from({length:K},(_,k)=>(groups[k]||[]).length);

  const nSpend=norm(spends), nFreq=norm(freqs), nRec=recs, nClv=norm(clvs), nSize=norm(sizes);

  destroyChart('radarChart');
  charts.radar = new Chart(document.getElementById('radarChart'),{
    type:'radar',
    data:{
      labels:['Spend','Frequency','Recency\n(inv.)','CLV','Size'],
      datasets: Array.from({length:K},(_,k)=>({
        label:segName(K,k),
        data:[nSpend[k],nFreq[k],nRec[k],nClv[k],nSize[k]],
        borderColor:SEG_COLORS[k], backgroundColor:SEG_COLORS[k]+'22',
        pointBackgroundColor:SEG_COLORS[k], borderWidth:2
      }))
    },
    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{legend:{labels:{color:'#8b949e',font:{size:10}}}},
      scales:{r:{ticks:{color:'#8b949e',font:{size:9}},grid:{color:'#30363d'},pointLabels:{color:'#8b949e',font:{size:10}}}}
    }
  });
}

// ── INSIGHTS ─────────────────────────────────────────────────────
const INSIGHT_TEMPLATES = [
  (groups,K,names) => {
    const k=0, m=groups[0]||[];
    if(!m.length) return null;
    const avg=Math.round(m.reduce((s,c)=>s+c.spend,0)/m.length);
    return {color:SEG_COLORS[0], head:`💎 ${names[0]} — High Value`, body:`${m.length} customers averaging ₹${avg.toLocaleString('en-IN')} spend. Focus on retention & exclusivity perks.`};
  },
  (groups,K,names) => {
    const k=K-1, m=groups[k]||[];
    if(!m.length) return null;
    const avgR=Math.round(m.reduce((s,c)=>s+c.recency,0)/m.length);
    return {color:SEG_COLORS[k], head:`💤 ${names[k]} — Re-engage`, body:`${m.length} customers last seen ~${avgR} days ago. Win-back campaigns & personalised offers recommended.`};
  },
  (groups,K,names) => {
    const atRisk=K>=3?groups[2]||[]:[];
    if(!atRisk.length) return null;
    return {color:SEG_COLORS[2], head:`⚠️ ${names[2]} — Attention Needed`, body:`${atRisk.length} customers showing declining engagement. Email nudges & limited-time deals can re-activate them.`};
  },
  (groups,K,names) => {
    const newC=K>=5?groups[3]||[]:[];
    if(!newC.length) return null;
    const avgAge=Math.round(newC.reduce((s,c)=>s+c.age,0)/newC.length);
    return {color:SEG_COLORS[3], head:`🌱 ${names[3]} — Onboarding`, body:`${newC.length} new customers, avg age ${avgAge}. Onboarding flows & first-purchase coupons boost LTV significantly.`};
  },
];

function renderInsights(){
  const names = Array.from({length:K},(_,k)=>segName(K,k));
  const groups = getSegGroups();
  const box = document.getElementById('insightsBox');
  box.innerHTML='';
  INSIGHT_TEMPLATES.slice(0, K).forEach(fn=>{
    const ins = fn(groups, K, names);
    if(!ins) return;
    const div=document.createElement('div');
    div.className='insight';
    div.style.setProperty('--i-color', ins.color);
    div.innerHTML=`<div class="insight-head">${ins.head}</div><div class="insight-body">${ins.body}</div>`;
    box.appendChild(div);
  });
}

// ── TABLE ─────────────────────────────────────────────────────────
function renderTable(){
  const sample = customers.slice(0,60);
  document.getElementById('tableCount').textContent = `showing 60 of ${customers.length}`;
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML='';
  sample.forEach(c=>{
    const color = SEG_COLORS[c.cluster];
    const name = segName(K, c.cluster);
    const tr = document.createElement('tr');
    tr.innerHTML=`
      <td style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--muted)">${c.id}</td>
      <td>${c.name}</td>
      <td>${c.age}</td>
      <td>${c.gender}</td>
      <td><span class="seg-tag" style="--tag-color:${color}">${name}</span></td>
      <td>₹${c.spend.toLocaleString('en-IN')}</td>
      <td>${c.freq}×/mo</td>
      <td>${c.recency}d</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:0.75rem">${c.clv}</td>`;
    tbody.appendChild(tr);
  });
}

// ── CSV UPLOAD ────────────────────────────────────────────────────
function loadCSV(event){
  const file = event.target.files[0];
  if(!file) return;
  Papa.parse(file,{
    header:true, skipEmptyLines:true,
    complete:(results)=>{
      const rows = results.data;
      const mapped = rows.map((r,i)=>({
        id: r.id||`CUS${String(i+1).padStart(4,'0')}`,
        name: r.name||r.Name||`Customer ${i+1}`,
        age: parseInt(r.age||r.Age)||30,
        gender: r.gender||r.Gender||'M',
        spend: parseFloat(r.spend||r.Spend||r.purchase_amount||0),
        freq: parseFloat(r.frequency||r.Frequency||r.freq||1),
        recency: parseFloat(r.recency||r.Recency||30),
        clv: parseFloat(r.clv||r.CLV||0)||0,
        category: r.category||r.Category||'General',
        cluster:-1
      })).filter(c=>c.spend>0);
      if(mapped.length<10){ showStatus('⚠️ CSV needs columns: spend, frequency, recency (min 10 rows)'); return; }
      customers = mapped;
      document.getElementById('dataInfo').textContent = `CSV · ${customers.length} customers · K=${K}`;
      runClustering();
      showStatus(`✓ Loaded ${customers.length} customers from CSV`);
    },
    error:()=>showStatus('⚠️ Error parsing CSV')
  });
}

// ── EXPORT ────────────────────────────────────────────────────────
function downloadReport(){
  const groups = getSegGroups();
  const lines = ['ID,Name,Age,Gender,Segment,Spend,Frequency,Recency,CLV'];
  customers.forEach(c=>{
    lines.push([c.id,c.name,c.age,c.gender,segName(K,c.cluster),c.spend,c.freq,c.recency,c.clv].join(','));
  });
  const blob = new Blob([lines.join('\n')],{type:'text/csv'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='customer_segments.csv'; a.click();
}

function destroyChart(id){
  if(charts[id]){ charts[id].destroy(); delete charts[id]; }
}
</script>
